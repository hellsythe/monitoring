# Configuracion Prometheus para el stack de monitoring.
# Edita la seccion `scrape_configs` para apuntar a tus aplicaciones.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Carga de reglas de alertas/records
rule_files:
  - /etc/prometheus/rules/*.yml

# Integracion con Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Auto-scrape de Prometheus a si mismo
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus

  # Alertmanager expone metricas en /metrics en el puerto 9093
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: alertmanager

  # Loki expone metricas en /metrics en el puerto 3100
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: loki

  # Promtail expone metricas en /metrics en el puerto 9080
  - job_name: promtail
    metrics_path: /metrics
    static_configs:
      - targets: ['promtail:9080']
        labels:
          service: promtail

  # ============================================================
  # TUS APLICACIONES
  # ============================================================
  # Descomenta y adapta los siguientes bloques para scrape de tus apps.
  # Recomendacion: en Coolify el backend debe exponer un endpoint
  # /metrics (publico o protegido con basic_auth).

  # Ejemplo 1: scrape via URL publica
  # - job_name: backend
  #   metrics_path: /metrics
  #   scheme: https
  #   static_configs:
  #     - targets: ['api.tudominio.com:443']
  #       labels:
  #         service: backend
  #         env: production

  # Ejemplo 2: scrape via red Docker (ambas apps en la misma network)
  # - job_name: backend
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ['backend:3000']
  #       labels:
  #         service: backend
  #         env: production

  # Ejemplo 3: con basic auth para endpoint protegido
  # - job_name: backend
  #   metrics_path: /metrics
  #   basic_auth:
  #     username: prometheus
  #     password_file: /etc/prometheus/metrics_password
