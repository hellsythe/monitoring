# =============================================================================
# Grafana + Prometheus + Loki + Promtail stack
# =============================================================================
#
# DESPLIEGUE EN COOLIFY:
#   En Coolify, este stack debe desplegarse como un recurso de tipo
#   "Docker Compose" (no como Application/Service) porque Promtail necesita
#   montar /var/run/docker.sock, lo cual esta restringido en los tipos
#   de recurso estandar.
#
#   Pasos:
#     1. Sube esta carpeta a un repo Git (o usa git init local).
#     2. En Coolify, crea un nuevo "Resource" -> "Docker Compose".
#     3. Apuntalo al repo y a la rama.
#     4. Configura las variables de entorno (GRAFANA_ADMIN_PASSWORD, etc).
#     5. Asigna un dominio al servicio "grafana" para HTTPS automatico.
#
# USO LOCAL:
#   cp .env.example .env
#   docker compose up -d
#
# NOTAS:
#   - Los puertos estan bindeados a 127.0.0.1 (loopback). Coolify Traefik
#     corre en el host, asi que puede acceder a ellos sin exponerlos
#     publicamente.
#   - Grafana se expone al exterior exclusivamente por Coolify/Traefik.
# =============================================================================

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: monitoring-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9091:9090"
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  loki:
    image: grafana/loki:3.3.2
    container_name: monitoring-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3101:3100"
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  promtail:
    image: grafana/promtail:3.3.2
    container_name: monitoring-promtail
    command: -config.file=/etc/promtail/config.yml
    user: "0:0"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  grafana:
    image: grafana/grafana:11.4.0
    container_name: monitoring-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS:-}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3030:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    labels:
      # Coolify detecta FQDNs con la variable ${SERVICE_FQDN_<PUERTO>}
      # La sustitucion la hace Coolify al desplegar.
      - "coolify.managed=true"
      - "coolify.type=service"
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${SERVICE_FQDN_GRAFANA:-grafana.localhost}`)"
      - "traefik.http.routers.grafana.entrypoints=https"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

networks:
  monitoring:
    name: monitoring
    driver: bridge

volumes:
  prometheus-data:
    name: monitoring-prometheus-data
  loki-data:
    name: monitoring-loki-data
  grafana-data:
    name: monitoring-grafana-data
