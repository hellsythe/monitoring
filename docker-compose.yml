# =============================================================================
# Grafana + Prometheus + Loki + Promtail + Alertmanager stack
# =============================================================================
#
# DESPLIEGUE EN COOLIFY:
#   En Coolify, este stack debe desplegarse como un recurso de tipo
#   "Docker Compose" (no como Application/Service) porque Promtail necesita
#   montar /var/run/docker.sock, lo cual esta restringido en los tipos
#   de recurso estandar.
#
#   Pasos:
#     1. Sube esta carpeta a un repo Git (o usa git init local).
#     2. En Coolify, crea un nuevo "Resource" -> "Docker Compose".
#     3. Apuntalo al repo y a la rama.
#     4. Configura las variables de entorno (GRAFANA_ADMIN_PASSWORD, etc).
#     5. Asigna UN UNICO dominio al servicio "grafana" para HTTPS automatico.
#
# USO LOCAL:
#   cp .env.example .env
#   docker compose up -d
#
# DOMINIOS EN COOLIFY:
#   SOLO grafana debe tener un dominio publico. Los demas servicios quedan
#   accesibles solo desde el host o via tunnel SSH:
#
#   Servicio     | Dominio publico | Por que
#   -------------|-----------------|----------------------------------
#   grafana      | SI (HTTPS)      | UI para humanos
#   prometheus   | NO              | API de PromQL + reload de config
#   alertmanager | NO              | UI de gestion de alertas
#   loki         | NO              | API de queries a logs
#   promtail     | NO              | Agente sin UI
#
#   Si necesitas la UI de prometheus/alertmanager/loki para debug, usa SSH:
#     ssh -L 9091:127.0.0.1:9091 usuario@server    # prometheus
#     ssh -L 9093:127.0.0.1:9093 usuario@server    # alertmanager
#     ssh -L 3101:127.0.0.1:3101 usuario@server    # loki
#
# NOTAS:
#   - Grafana habla con prometheus/loki internamente por la red 'monitoring'
#     usando los nombres de servicio (prometheus:9090, loki:3100).
#   - Los puertos en 127.0.0.1 son solo para el host (debug SSH).
# =============================================================================

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: monitoring-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9091:9090"
    networks:
      - monitoring
    # depends_on:                          # deshabilitado: alertmanager ya no se despliega
    #   - alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    labels:
      - "traefik.enable=false"
      - "coolify.managed=false"
      - "coolify.exclude=true"

  # alertmanager:
  #   image: prom/alertmanager:v0.27.0
  #   container_name: monitoring-alertmanager
  #   command:
  #     - '--config.file=/etc/alertmanager/alertmanager.yml'
  #     - '--storage.path=/alertmanager'
  #   volumes:
  #     - ./alertmanager/entrypoint.sh:/entrypoint.sh:ro
  #     - ./alertmanager/alertmanager.yml.template:/etc/alertmanager/alertmanager.yml.template:ro
  #     - alertmanager-data:/alertmanager
  #   entrypoint: ['/bin/sh', '/entrypoint.sh']
  #   environment:
  #     - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
  #     - SMTP_SMARTHOST=${SMTP_SMARTHOST:-}
  #     - SMTP_USERNAME=${SMTP_USERNAME:-}
  #     - SMTP_PASSWORD=${SMTP_PASSWORD:-}
  #   ports:
  #     - "127.0.0.1:9093:9093"
  #   networks:
  #     - monitoring
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.5'
  #         memory: 256M
  #   labels:
  #     - "traefik.enable=false"
  #     - "coolify.managed=false"
  #     - "coolify.exclude=true"

  loki:
    image: grafana/loki:3.3.2
    container_name: monitoring-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3101:3100"
    networks:
      - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    labels:
      - "traefik.enable=false"
      - "coolify.managed=false"
      - "coolify.exclude=true"

  promtail:
    image: grafana/promtail:3.3.2
    container_name: monitoring-promtail
    command: -config.file=/etc/promtail/config.yml
    user: "0:0"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    depends_on:
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    labels:
      - "traefik.enable=false"
      - "coolify.managed=false"
      - "coolify.exclude=true"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: monitoring-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS:-}
    volumes:
      - ./grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards/logs.json:/var/lib/grafana/dashboards/logs.json:ro
      - ./grafana/dashboards/metrics.json:/var/lib/grafana/dashboards/metrics.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3030:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    labels:
      - "coolify.managed=true"
      - "coolify.type=service"
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${SERVICE_FQDN_GRAFANA:-grafana.localhost}`)"
      - "traefik.http.routers.grafana.entrypoints=https"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

networks:
  monitoring:
    name: monitoring
    driver: bridge

volumes:
  prometheus-data:
    name: monitoring-prometheus-data
  # alertmanager-data:                       # deshabilitado: alertmanager ya no se despliega
  #   name: monitoring-alertmanager-data
  loki-data:
    name: monitoring-loki-data
  grafana-data:
    name: monitoring-grafana-data
