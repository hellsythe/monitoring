# Configuracion Prometheus para el stack de monitoring.
#
# =============================================================================
# RED EN COOLIFY: NOTA IMPORTANTE
# =============================================================================
# Cuando despliegas apps via Coolify, cada app vive en su propia Docker
# network (por ejemplo 'coolify'). El stack de monitoring vive en su propia
# network ('monitoring') y NO comparte red con tus apps por defecto.
#
# Para que Prometheus pueda scrape el endpoint /metrics de tus apps, tenes
# dos opciones:
#
# A) SCRAPE POR URL PUBLICA (RECOMENDADO)
#    Tu app expone /metrics publicamente (con HTTPS + basic_auth) y
#    Prometheus lo scrapea como si fuera un servicio externo. No requiere
#    tocar redes de Docker. Ver "Opcion A" abajo.
#
# B) COMPARTIR RED CON COOLIFY
#    Agregas la network 'coolify' como externa en este compose y conectas
#    Prometheus a ella. Mas fragil porque el nombre de la red puede variar.
#    Ver "Opcion B" abajo.
#
# Para LOGS no hay problema: Promtail descubre todos los containers via
# /var/run/docker.sock, sin importar en que red esten.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Carga de reglas de alertas/records
rule_files:
  - /etc/prometheus/rules/*.yml

# Integracion con Alertmanager (deshabilitado)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

scrape_configs:
  # Auto-scrape de Prometheus a si mismo
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus

  # Alertmanager expone metricas en /metrics en el puerto 9093 (deshabilitado)
  # - job_name: alertmanager
  #   static_configs:
  #     - targets: ['alertmanager:9093']
  #       labels:
  #         service: alertmanager

  # Loki expone metricas en /metrics en el puerto 3100
  - job_name: loki
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: loki

  # Promtail expone metricas en /metrics en el puerto 9080
  - job_name: promtail
    metrics_path: /metrics
    static_configs:
      - targets: ['promtail:9080']
        labels:
          service: promtail

  # ============================================================
  # TUS APLICACIONES
  # ============================================================
  # Descomenta el ejemplo que se ajuste a tu setup.
  # Para que esto funcione, tu backend debe exponer un endpoint /metrics.
  # Backends comunes: NestJS (usando prom-client), Express, Fastify.

  # ---------- OPCION A: SCRAPE VIA URL PUBLICA (RECOMENDADO) ----------
  # Requiere que tu backend exponga /metrics por HTTPS (con o sin basic_auth).
  # No requiere cambios de red.
  #
  - job_name: backend
    metrics_path: /api/v1/metrics
    scheme: https
    scrape_interval: 30s
    static_configs:
      - targets: ['propiedades-back.sdkconsultoria.com']
        labels:
          service: backend
          env: production
  # basic_auth:                                # opcional, recomendado
  #   username: prometheus
  #   password_file: /etc/prometheus/metrics_password

  # ---------- OPCION B: SCRAPE VIA RED DOCKER COMPARTIDA ----------
  # Requiere que tanto este stack como tu app esten en la misma network.
  # Para usarlo:
  #   1. Averigua el nombre de la red de tu app en Coolify
  #      (usualmente 'coolify' o por proyecto)
  #   2. Agrega la network externa al final de este compose
  #   3. Conecta el servicio prometheus a esa network
  # No necesita URLs publicas.
  #
  # - job_name: backend
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ['backend:3000']
  #       labels:
  #         service: backend
  #         env: production
