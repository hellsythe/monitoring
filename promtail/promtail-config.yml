# Promtail: agente que envia logs de containers Docker a Loki.
# Descubre containers via /var/run/docker.sock (montado en el compose).

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Ignorar el propio stack de monitoring y proxies para no contaminar logs
      - source_labels: ['__meta_docker_container_name']
        regex: '/(promtail|loki|grafana|prometheus|caddy|traefik).*'
        action: drop

      # Nombre limpio del container (sin la barra inicial de Docker)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'

      # Tipo de stream: stdout o stderr
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'

      # Labels de Coolify (si existen)
      - source_labels: ['__meta_docker_container_label_coolify_service_name']
        target_label: 'coolify_service'
      - source_labels: ['__meta_docker_container_label_coolify_project_name']
        target_label: 'coolify_project'
      - source_labels: ['__meta_docker_container_label_coolify_environment_name']
        target_label: 'coolify_environment'

      # Fallback para docker-compose local (si aplica)
      - source_labels: ['__meta_docker_compose_service']
        target_label: 'compose_service'
    pipeline_stages:
      - docker: {}
